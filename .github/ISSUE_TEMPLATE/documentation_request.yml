name: Feature request
description: "Suggest an idea/change for the documentation"
labels: [ "Type: Enhancement" ]
body:
  - type: textarea
    attributes:
    label: What site do you want to be added/changed?
    description: >
      Please describe what you want to be added/changed.
    validations:
        required: true


  - type: textarea
    attributes:
      label: "Describe the solution you'd like."
      description: >
        A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: textarea
    attributes:
      label: "Describe alternatives you've considered."
      description: >
        A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    attributes:
      label: Additional context
      description: >
        Add any other context or screenshots about the feature request here.
    validations:
      required: false

  - type: markdown
    attributes:
      value: "Thank you for taking the time to make a report and help improve Create: Sound of Steam!"
